name: Publish to npm

# npm Trusted Publishing (OIDC): no tokens, no 2FA prompts. The npm package
# @opzyai/mcp must have this repo + workflow configured as a Trusted Publisher
# (npmjs.com > package > Settings > Trusted Publisher).
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # npm CLI (>= 11.5) does the OIDC trusted-publishing exchange natively;
      # pnpm's exchange 404s against npm's endpoint. devDependencies use
      # workspace:* specifiers npm can't parse - strip them (irrelevant to
      # consumers; the tarball is already built by the pnpm steps above).
      - name: Strip workspace devDependencies for npm publish
        run: node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));delete p.devDependencies;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
        working-directory: packages/mcp-local
      - run: npm publish --access public
        working-directory: packages/mcp-local
